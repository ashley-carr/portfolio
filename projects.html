<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projects - Featured Power Platform, Azure, and web development projects by Ashley Carr.">
    <link id="canonical-link" rel="canonical" href="projects.html">
    <meta property="og:title" content="Projects | Ashley Carr">
    <meta property="og:description" content="Case-study projects across Power Platform, Azure, and web development built to mirror real-world delivery.">
    <meta property="og:type" content="website">
    <meta id="meta-og-url" property="og:url" content="projects.html">
    <meta id="meta-og-image" property="og:image" content="assets/images/ashley-carr-profile.png">
    <title>Projects | Ashley Carr</title>
    
    <!-- Shared early theme initialization -->
    <script src="assets/js/theme-init.js"></script>
    
    <!-- Tailwind CSS with dark mode config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config.darkMode = 'class';
    </script>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-white">
    <!-- Header -->
    <header id="header" class="fixed top-0 w-full bg-white dark:bg-gray-900 shadow-sm z-50">
        <!-- Header content will be inserted by global.js -->
    </header>

    <!-- Main Content -->
    <main class="pt-24 pb-24">
        <!-- Page Header -->
        <section class="bg-white dark:bg-gray-900 section-block border-b border-gray-200 dark:border-gray-800">
            <div class="container-narrow text-center">
                <h1 class="section-title mb-2">Projects</h1>
                <p class="text-lg text-gray-600 dark:text-gray-400 page-lead max-w-5xl mx-auto">A selection of Power Platform, Azure, and web development case-study projects designed and built to mirror real-world client delivery.</p>
            </div>
        </section>

        <!-- Projects Grid -->
        <section class="bg-gray-50 dark:bg-gray-950 section-block">
            <div class="container-narrow">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="projects-grid">
                    <!-- Projects will be loaded from JSON -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="mt-20 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800">
        <!-- Footer content will be inserted by global.js -->
    </footer>

    <!-- Global Scripts -->
    <script src="assets/js/global.js"></script>
</body>
</html>
