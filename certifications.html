<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Certifications - Ashley Carr's Microsoft certifications, applied skills, and professional credentials.">
    <link id="canonical-link" rel="canonical" href="certifications.html">
    <meta property="og:title" content="Certifications | Ashley Carr">
    <meta property="og:description" content="Microsoft certifications, exams, and applied skills across Power Platform, Dynamics 365, Azure, and data analytics.">
    <meta property="og:type" content="website">
    <meta id="meta-og-url" property="og:url" content="certifications.html">
    <meta id="meta-og-image" property="og:image" content="assets/images/ashley-carr-profile.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Certifications | Ashley Carr">
    <meta name="twitter:description" content="Microsoft certifications, exams, and applied skills across Power Platform, Dynamics 365, Azure, and data analytics.">
    <meta id="meta-twitter-image" name="twitter:image" content="assets/images/ashley-carr-profile.png">
    <title>Certifications | Ashley Carr</title>
    
    <!-- Shared early theme initialization -->
    <script src="assets/js/theme-init.js"></script>
    
    <!-- Tailwind CSS with dark mode config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config.darkMode = 'class';
    </script>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-white">
    <!-- Header -->
    <header id="header" class="fixed top-0 w-full bg-white dark:bg-gray-900 shadow-sm z-50">
        <!-- Header content will be inserted by global.js -->
    </header>

    <!-- Main Content -->
    <main class="pt-24 pb-24">
        <!-- Page Header -->
        <section class="bg-white dark:bg-gray-900 section-block border-b border-gray-200 dark:border-gray-800">
            <div class="container-narrow text-center">
                <h1 class="section-title mb-2">Certifications</h1>
                <p class="text-lg text-gray-600 dark:text-gray-400 page-lead max-w-5xl mx-auto">Microsoft certifications and applied skills demonstrating expertise across Power Platform, Dynamics 365, and Azure.</p>
            </div>
        </section>

        <!-- Summary Stats -->
        <section class="bg-gray-50 dark:bg-gray-950 section-block">
            <div class="container-narrow">
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                    <div class="surface-card stat-card stat-card-neutral p-6 text-center">
                        <p class="text-sm font-medium text-gray-600 dark:text-gray-400 mb-2 leading-5 stat-label">
                            <span class="block">Total</span>
                            <span class="block">Certifications</span>
                        </p>
                        <p id="stat-total-certs" class="text-3xl font-bold text-gray-900 dark:text-white">0</p>
                    </div>
                    <div class="surface-card stat-card stat-card-green p-6 text-center">
                        <p class="text-sm font-medium text-gray-600 dark:text-gray-400 mb-2 leading-5 stat-label">
                            <span class="block">Active</span>
                            <span class="block">Certifications</span>
                        </p>
                        <p id="stat-active-certs" class="text-3xl font-bold text-green-600 dark:text-green-400">0</p>
                    </div>
                    <div class="surface-card stat-card stat-card-slate p-6 text-center">
                        <p class="text-sm font-medium text-gray-600 dark:text-gray-400 mb-2 leading-5 stat-label">
                            <span class="block">Retired</span>
                            <span class="block">Certifications</span>
                        </p>
                        <p id="stat-retired-certs" class="text-3xl font-bold text-gray-600 dark:text-gray-400">0</p>
                    </div>
                    <div class="surface-card stat-card stat-card-amber p-6 text-center">
                        <p class="text-sm font-medium text-gray-600 dark:text-gray-400 mb-2 leading-5 stat-label">
                            <span class="block">Exams</span>
                            <span class="block">Passed</span>
                        </p>
                        <p id="stat-exams" class="text-3xl font-bold text-yellow-600 dark:text-yellow-400">0</p>
                    </div>
                    <div class="surface-card stat-card stat-card-blue p-6 text-center">
                        <p class="text-sm font-medium text-gray-600 dark:text-gray-400 mb-2 leading-5 stat-label">
                            <span class="block">Applied</span>
                            <span class="block">Skills</span>
                        </p>
                        <p id="stat-applied-skills" class="text-3xl font-bold text-blue-600 dark:text-blue-400">0</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Filters -->
        <section class="bg-white dark:bg-gray-900 py-8 border-b border-gray-200 dark:border-gray-800">
            <div class="container-narrow">
                <div class="flex flex-wrap gap-3">
                    <button class="filter-btn active px-6 py-2 rounded-full font-medium transition-all" data-filter="all" aria-pressed="true">
                        All
                    </button>
                    <button class="filter-btn px-6 py-2 rounded-full font-medium transition-all" data-filter="active" aria-pressed="false">
                        Active
                    </button>
                    <button class="filter-btn px-6 py-2 rounded-full font-medium transition-all" data-filter="retired" aria-pressed="false">
                        Retired
                    </button>
                    <button class="filter-btn px-6 py-2 rounded-full font-medium transition-all" data-filter="exams" aria-pressed="false">
                        Exams
                    </button>
                    <button class="filter-btn px-6 py-2 rounded-full font-medium transition-all" data-filter="applied" aria-pressed="false">
                        Applied Skills
                    </button>
                </div>
            </div>
        </section>

        <!-- Certifications Table/Cards -->
        <section class="bg-gray-50 dark:bg-gray-950 section-block">
            <div class="container-narrow">
                <!-- Desktop Table -->
                <div class="hidden md:block overflow-x-auto table-shell surface-card">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-300 dark:border-gray-700">
                                <th class="text-left py-4 px-4 font-semibold text-gray-900 dark:text-white">Type</th>
                                <th class="text-left py-4 px-4 font-semibold text-gray-900 dark:text-white">Title</th>
                                <th class="text-left py-4 px-4 font-semibold text-gray-900 dark:text-white">Status</th>
                                <th class="text-left py-4 px-4 font-semibold text-gray-900 dark:text-white">Issued</th>
                            </tr>
                        </thead>
                        <tbody id="certifications-table-body">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Mobile Cards -->
                <div id="certifications-cards" class="md:hidden space-y-4">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="mt-20 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800">
        <!-- Footer content will be inserted by global.js -->
    </footer>

    <!-- Global Scripts -->
    <script src="assets/js/global.js"></script>
</body>
</html>
